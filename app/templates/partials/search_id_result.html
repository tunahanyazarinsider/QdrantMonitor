{% if error %}
<div class="qd-card p-5">
  <div class="flex items-center gap-2 text-[#f87171]">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span class="text-sm">{{ error }}</span>
  </div>
</div>

{% elif point %}
<div class="qd-card p-5 space-y-4">
  <!-- Point header -->
  <div class="flex items-center gap-3">
    <span class="badge badge-blue">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/>
      </svg>
      Point
    </span>
    <span class="font-mono text-sm text-[#38bdf8]">{{ point.id }}</span>
  </div>

  <!-- Payload -->
  <div>
    <h3 class="text-[0.6875rem] text-[#4b5f82] uppercase tracking-wider mb-2">Payload</h3>
    <pre class="json-block">{{ point.payload_json }}</pre>
  </div>

  <!-- Vectors (if requested) -->
  {% if point.vector_json %}
  <div>
    <h3 class="text-[0.6875rem] text-[#4b5f82] uppercase tracking-wider mb-2">Vectors</h3>
    <div class="json-block max-h-60 overflow-y-auto">{{ point.vector_json }}</div>
  </div>
  {% endif %}
</div>
{% endif %}
