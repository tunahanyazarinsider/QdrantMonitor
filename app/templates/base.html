<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Qdrant Monitor{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Syne', 'sans-serif'],
          body: ['DM Sans', 'sans-serif'],
          mono: ['Fira Code', 'monospace'],
        },
      }
    }
  }
  </script>

  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dot-grid font-body text-[#94a8c8] min-h-screen">

  <!-- ── Nav ── -->
  <nav class="qd-nav">
    <div class="max-w-[1400px] mx-auto px-6 h-14 flex items-center justify-between">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-3 group">
        <div class="relative">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L25.5 9V19L14 26L2.5 19V9L14 2Z" stroke="#00e5a0" stroke-width="1.5" fill="rgba(0,229,160,0.08)"/>
            <circle cx="14" cy="14" r="3" fill="#00e5a0" opacity="0.8"/>
            <circle cx="14" cy="7" r="1.5" fill="#38bdf8" opacity="0.6"/>
            <circle cx="20" cy="18" r="1.5" fill="#38bdf8" opacity="0.6"/>
            <circle cx="8" cy="18" r="1.5" fill="#38bdf8" opacity="0.6"/>
            <line x1="14" y1="11" x2="14" y2="8.5" stroke="#38bdf8" stroke-width="0.8" opacity="0.4"/>
            <line x1="16.5" y1="15.5" x2="18.5" y2="17" stroke="#38bdf8" stroke-width="0.8" opacity="0.4"/>
            <line x1="11.5" y1="15.5" x2="9.5" y2="17" stroke="#38bdf8" stroke-width="0.8" opacity="0.4"/>
          </svg>
        </div>
        <span class="font-display font-bold text-lg text-white tracking-tight group-hover:text-[#00e5a0] transition-colors">
          Qdrant Monitor
        </span>
      </a>

      <div class="flex items-center gap-6">
        <!-- Status -->
        <div class="flex items-center gap-2.5">
          {% if conn.connected %}
          <span class="w-2 h-2 rounded-full bg-[#22c55e] status-pulse-green"></span>
          <span class="text-xs font-mono text-[#4ade80]">Connected</span>
          {% else %}
          <span class="w-2 h-2 rounded-full bg-[#ef4444] status-pulse-red"></span>
          <span class="text-xs font-mono text-[#f87171]">Disconnected</span>
          {% endif %}
        </div>

        <!-- Connection form -->
        <form method="post" action="/api/connect" class="flex items-center gap-2">
          <input name="host" value="{{ conn.host }}"
                 class="qd-input w-32 text-xs py-1.5 px-3"
                 placeholder="host">
          <input name="port" value="{{ conn.port }}" type="number"
                 class="qd-input w-20 text-xs py-1.5 px-3"
                 placeholder="port">
          <button type="submit" class="qd-btn text-xs py-1.5 px-4">Connect</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main class="max-w-[1400px] mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
